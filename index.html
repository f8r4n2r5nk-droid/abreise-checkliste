<style>

      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #3b82f6;
      --accent-soft: #1e3a5f;
      --done: #22c55e;
      --done-soft: #14352a;
      --shadow: 0 1px 3px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.2);

    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    color: var(--text);
    line-height: 1.5;
    padding: 0 0 4rem;

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--card);
    border-bottom: 1px solid var(--border);

    box-shadow: 0 1px 8px rgba(0,0,0,.04);

  h1 { font-size: 1.15rem; margin: 0 0 .15rem; display: flex; align-items: center; gap: .5rem; }
  .sub { color: var(--muted); font-size: .82rem; margin: 0; }
  .progress-row { display: flex; align-items: center; gap: .75rem; margin-top: .75rem; }
  .bar { flex: 1; height: 9px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .bar > span { display: block; height: 100%; width: 0; background: var(--accent); border-radius: 99px; transition: width .3s ease, background .3s ease; }
  .bar.complete > span { background: var(--done); }
  .count { font-size: .82rem; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  main { max-width: 720px; margin: 1.25rem auto 0; padding: 0 1rem; }

    margin: 0; font-size: .95rem; padding: .85rem 1rem; display: flex; align-items: center; gap: .55rem;

  .section > h2 .sec-count { margin-left: auto; font-size: .75rem; color: var(--muted); font-weight: 500; font-variant-numeric: tabular-nums; }

  .item-row { display: flex; align-items: flex-start; gap: .7rem; }
  li .box, li .label { cursor: pointer; }
  li:hover { background: var(--bg); }
  li .box {
    flex: none; width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 7px;
    margin-top: 1px; display: grid; place-items: center; transition: all .15s;
  }
  li .box svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 3.5; fill: none; opacity: 0; transition: opacity .12s; }
  li.done .box { background: var(--done); border-color: var(--done); }
  li.done .box svg { opacity: 1; }
  li .label { flex: 1; font-size: .92rem; }
  li.done .label { color: var(--muted); text-decoration: line-through; }
  li .del { flex: none; opacity: 0; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 1.05rem; padding: 0 .2rem; line-height: 1; }
  li:hover .del { opacity: .6; }
  li .del:hover { opacity: 1; color: #ef4444; }
  .add-row { display: flex; gap: .4rem; padding: .3rem .6rem .7rem; }
  .add-row input {
    flex: 1; border: 1px solid var(--border); background: var(--bg); color: var(--text);
    border-radius: 9px; padding: .5rem .65rem; font-size: .88rem; outline: none;
  }

  .add-row button {
    border: none; background: var(--accent-soft); color: var(--accent); font-weight: 600;

  .toolbar { display: flex; gap: .5rem; flex-wrap: wrap; margin: 0 0 1.25rem; }
  .toolbar button {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 9px; padding: .5rem .9rem; cursor: pointer; font-size: .85rem; box-shadow: var(--shadow);
  }
  .toolbar button:hover { border-color: var(--accent); color: var(--accent); }
  .done-banner {
    text-align: center; padding: 1rem; margin-bottom: 1rem; border-radius: 12px;
    background: var(--done-soft); color: var(--done); font-weight: 600; display: none;
  }
  .done-banner.show { display: block; }
  .attach-btn { flex: none; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 .15rem; opacity: .5; }
  li:hover .attach-btn { opacity: .9; }
  .attach-menu { display: flex; gap: .4rem; margin: .45rem 0 .15rem 2rem; }
  .attach-menu button { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 8px; padding: .35rem .65rem; font-size: .82rem; cursor: pointer; }
  .attach-menu button:hover { border-color: var(--accent); color: var(--accent); }
  .atts { display: flex; flex-wrap: wrap; gap: .4rem; margin: .4rem 0 .1rem 2rem; }
  .att { display: inline-flex; align-items: center; gap: .35rem; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: .22rem .45rem; font-size: .8rem; cursor: pointer; max-width: 100%; }
  .att:hover { border-color: var(--accent); }
  .att img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; display: block; }
  .att .att-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
  .att .att-del { border: none; background: none; color: var(--muted); cursor: pointer; font-size: .95rem; line-height: 1; padding: 0 0 0 .1rem; }
  .att .att-del:hover { color: #ef4444; }
  .routes { display: flex; gap: .4rem; margin: .55rem 0 .2rem; }
  .route-tab { flex: 1; border: 1px solid var(--border); background: var(--bg); color: var(--muted); border-radius: 9px; padding: .45rem .5rem; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .12s; }
  .route-tab.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; z-index: 50; overflow-y: auto; }
  .panel { background: var(--card); color: var(--text); width: 100%; max-width: 640px; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
  .panel-head { display: flex; align-items: center; gap: .6rem; padding: .9rem 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); }
  .panel-head h2 { margin: 0; font-size: 1rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panel-close, .panel-back { border: none; background: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: .1rem .4rem; }
  .panel-back { font-size: .9rem; }
  .panel-close:hover, .panel-back:hover { color: var(--accent); }
  .panel-empty { padding: 1.5rem 1rem; color: var(--muted); text-align: center; }
  .arch-list { padding: .5rem; }
  .arch-row { display: flex; align-items: center; gap: .6rem; padding: .6rem .6rem; border-radius: 10px; }
  .arch-row:hover { background: var(--bg); }
  .arch-info { flex: 1; min-width: 0; }
  .arch-name { font-weight: 600; font-size: .95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .arch-meta { font-size: .78rem; color: var(--muted); }
  .arch-view { border: 1px solid var(--border); background: var(--card); color: var(--accent); border-radius: 8px; padding: .35rem .7rem; cursor: pointer; font-size: .82rem; }
  .arch-view:hover { border-color: var(--accent); }
  .arch-del { border: none; background: none; cursor: pointer; font-size: 1rem; opacity: .6; }
  .arch-del:hover { opacity: 1; }
  .arch-detail { padding: .5rem 1rem 1.2rem; }
  .arch-detail h3 { font-size: .88rem; margin: 1rem 0 .35rem; color: var(--muted); }
  .arch-item { display: flex; align-items: flex-start; gap: .5rem; padding: .25rem 0; font-size: .9rem; }
  .arch-item.done { color: var(--muted); }
  .arch-check { color: var(--done); font-weight: 700; width: 1.1em; flex: none; }
  footer { text-align: center; color: var(--muted); font-size: .75rem; margin-top: 1.5rem; padding: 0 1rem; }
</style>
</head>

  { id: "loe-vil", label: "Lörrach → Vilamoura", from: "Lörrach", to: "Vilamoura", def: DEFAULT_LOE_VIL },

// Gezielte Inhalts-Anpassungen, die auch auf bereits gespeicherten Listen greifen (idempotent).
const CONTENT_REV = 4;
function applyContentMigrations(st) {
  if ((st.contentRev || 0) < 1) {
    const lv = st.routes["loe-vil"];
    if (lv) {
      const pmt = lv.sections.find(s => s.t === "Pflanzen, Müll & Tiere");
      if (pmt) pmt.items = pmt.items.filter(i => !/^Tierversorgung geklärt/.test(i.x));  // keine Tiere in Lörrach
      const ank = lv.sections.find(s => s.t === "Nach Ankunft in Portugal");
      if (ank) {
        const m = ank.items.find(i => i.x === "Motorräder ans Ladegerät hängen");
        if (m) m.x = "Motorräder vom Ladegerät nehmen / startklar machen";
        if (!ank.items.some(i => /Katze/.test(i.x))) {
          const idx = ank.items.findIndex(i => i.x.startsWith("Motorräder vom Ladegerät"));
          ank.items.splice(idx >= 0 ? idx + 1 : ank.items.length, 0, { x: "Katzen versorgen / begrüßen", done: false });
        }
      }
    }
    const vl = st.routes["vil-loe"];
    if (vl) {
      const pmt2 = vl.sections.find(s => s.t === "Pflanzen, Müll & Tiere");
      if (pmt2) {
        const tier = pmt2.items.find(i => /^Tierversorgung geklärt/.test(i.x));
        if (tier) tier.x = "Katzensitter für 2 Katzen organisiert";
        else if (!pmt2.items.some(i => /Katze/.test(i.x))) pmt2.items.push({ x: "Katzensitter für 2 Katzen organisiert", done: false });
      }
    }
  }
  if ((st.contentRev || 0) < 2) {
    const vl = st.routes["vil-loe"];
    if (vl) {
      const vor = vl.sections.find(s => s.t === "Vor der Abreise erledigen");
      if (vor) {
        // vorne einfügen → Endreihenfolge: „Flüge buchen“, dann „Bolt / Uber …“
        ["Bolt / Uber zum Flughafen buchen", "Flüge buchen"].forEach(x => {
          if (!vor.items.some(i => i.x === x)) vor.items.unshift({ x, done: false });
        });
      }
    }
  }
  if ((st.contentRev || 0) < 3) {
    // Beide Richtungen per Flug; Fahrzeuge: Lörrach = Africa Twin, Vilamoura = Auto + 2 Motorräder
    const lv = st.routes["loe-vil"], vl = st.routes["vil-loe"];
    const find = (r, t) => r && r.sections.find(s => s.t === t);
    const rm  = (s, x) => { if (s) s.items = s.items.filter(i => i.x !== x); };
    const ren = (s, a, b) => { if (s) { const it = s.items.find(i => i.x === a); if (it) it.x = b; } };
    const add = (s, x, after) => { if (!s || s.items.some(i => i.x === x)) return; const idx = after ? s.items.findIndex(i => i.x === after) : -1; if (idx >= 0) s.items.splice(idx + 1, 0, { x, done: false }); else s.items.push({ x, done: false }); };
    const addTop = (s, x) => { if (s && !s.items.some(i => i.x === x)) s.items.unshift({ x, done: false }); };

    // Lörrach → Vilamoura
    const lvVor = find(lv, "Vor der Abreise erledigen");
    rm(lvVor, "Einkaufen für die Fahrt (Snacks, Getränke)");
    rm(lvVor, "Auto volltanken");
    rm(lvVor, "Auto checken: Reifen, Öl, Wischwasser");
    rm(lvVor, "Reiseroute / Übernachtung planen");
    ren(lvVor, "Motorrad zu Alex bringen", "Africa Twin zu Alex bringen");
    ["Koffer packen & Gewicht prüfen", "Online einchecken", "Maciek (Taxi) zum Flughafen buchen", "Flüge buchen"].forEach(x => addTop(lvVor, x));
    ren(find(lv, "Letzter Rundgang"), "Tür abgeschlossen – losfahren! 🚗", "Tür abgeschlossen – zum Flughafen! ✈️");
    add(find(lv, "Nach Ankunft in Portugal"), "Auto startklar machen (Batterie, Reifen)", "Motorräder vom Ladegerät nehmen / startklar machen");

    // Vilamoura → Lörrach
    const vlVor = find(vl, "Vor der Abreise erledigen");
    rm(vlVor, "Einkaufen für die Fahrt (Snacks, Getränke)");
    rm(vlVor, "Auto volltanken");
    rm(vlVor, "Auto checken: Reifen, Öl, Wischwasser");
    rm(vlVor, "Reiseroute / Übernachtung planen");
    add(vlVor, "Online einchecken", "Bolt / Uber zum Flughafen buchen");
    add(vlVor, "Koffer packen & Gewicht prüfen", "Online einchecken");
    const vlMoto = find(vl, "Motorräder & Garage");
    add(vlMoto, "Auto volltanken & abstellen", "Motorräder abdecken / sichern");
    add(vlMoto, "Auto-Batterie ans Erhaltungsladegerät / abklemmen", "Auto volltanken & abstellen");
    ren(find(vl, "Letzter Rundgang"), "Tür abgeschlossen – losfahren! 🚗", "Tür abgeschlossen – zum Flughafen! ✈️");
    ren(find(vl, "Nach Ankunft in Lörrach"), "Motorrad bei Alex abholen", "Africa Twin bei Alex abholen");
  }
  if ((st.contentRev || 0) < 4) {
    // In Lörrach kein Bolt/Uber → Maciek (Taxi). Vilamoura behält Bolt/Uber.
    const lv = st.routes["loe-vil"];
    const lvVor = lv && lv.sections.find(s => s.t === "Vor der Abreise erledigen");
    if (lvVor) {
      const it = lvVor.items.find(i => i.x === "Bolt / Uber zum Flughafen buchen");
      if (it) it.x = "Maciek (Taxi) zum Flughafen buchen";
      // Sicherheit: nur einen „Maciek …“-Eintrag behalten
      let seen = false;
      lvVor.items = lvVor.items.filter(i => {
        if (i.x === "Maciek (Taxi) zum Flughafen buchen") { if (seen) return false; seen = true; }
        return true;
      });
    }
  }
  st.contentRev = CONTENT_REV;
  return st;
}

// ---------- Speicherung: IndexedDB (groß genug für Bilder/Dateien) ----------
const DB_NAME = "abreise-checkliste-db", STORE = "kv", KEY = "state";
function idb() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(STORE);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key) {
  const db = await idb();
  return new Promise((res, rej) => {
    const q = db.transaction(STORE, "readonly").objectStore(STORE).get(key);
    q.onsuccess = () => res(q.result); q.onerror = () => rej(q.error);
  });
}
async function idbSet(key, val) {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
  });
}

function freshSection(d) { return { t: d.t, e: d.e, items: d.items.map(x => ({ x, done: false })) }; }
function freshRoute(def) { return { sections: def.map(freshSection), archives: [] }; }
function cur() { return state.routes[state.active]; }
function mergeDefaults(route, def) {
  // Bestehenden Fortschritt behalten, aber neue Standard-Bereiche an ihrer Position ergänzen.
  const have = new Set(route.sections.map(s => s.t));
  def.forEach((d, idx) => {
    if (!have.has(d.t)) route.sections.splice(Math.min(idx, route.sections.length), 0, freshSection(d));
  });
  return route;
}
async function load() {
  let saved = null;
  try { saved = await idbGet(KEY); } catch(e){}
  if (!saved) {
    // Einmalige Migration aus alter localStorage-Speicherung
    try { const ls = JSON.parse(localStorage.getItem(STORAGE)); if (ls && ls.sections) saved = ls; } catch(e){}
  }
  let st;
  if (saved && saved.routes) {
    st = saved;                                   // bereits neues Format
  } else if (saved && saved.sections) {
    // altes Einzel-Format → als Richtung „Lörrach → Vilamoura“ übernehmen
    st = { active: "loe-vil", routes: { "loe-vil": { sections: saved.sections, archives: saved.archives || [] } } };
  } else {
    st = { active: "loe-vil", routes: {} };
  }
  st.routes = st.routes || {};
  ROUTES.forEach(r => {
    if (!st.routes[r.id]) st.routes[r.id] = freshRoute(r.def);
    st.routes[r.id].archives = st.routes[r.id].archives || [];
    mergeDefaults(st.routes[r.id], r.def);
  });
  if (!st.active || !st.routes[st.active]) st.active = "loe-vil";
  applyContentMigrations(st);
  return st;
}
let saveTimer = null, initialized = false;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { idbSet(KEY, state).catch(() => alert("Speicher voll – Anhang evtl. zu groß.")); }, 150);
}
function flushSave() { if (!initialized) return; clearTimeout(saveTimer); idbSet(KEY, state).catch(() => {}); }
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushSave(); });
window.addEventListener("pagehide", flushSave);

// ---------- Anhänge ----------
function readFileAsDataURL(file) {
  return new Promise((res, rej) => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.onerror = () => rej(fr.error); fr.readAsDataURL(file); });
}
function processImage(file) {
  // Bilder verkleinern, damit der Speicher nicht überläuft
  return readFileAsDataURL(file).then(dataUrl => new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const max = 1400; let w = img.width, h = img.height;
      if (w > max || h > max) { const r = Math.min(max / w, max / h); w = Math.round(w * r); h = Math.round(h * r); }
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      res(c.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = () => res(dataUrl);
    img.src = dataUrl;
  }));
}
function dataUrlToBlob(dataUrl) {
  const [meta, b64] = dataUrl.split(",");
  const mime = (meta.match(/:(.*?);/) || [])[1] || "application/octet-stream";
  const bin = atob(b64), arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}
function openAttachment(a) {
  if (a.k === "link") { window.open(a.url, "_blank", "noopener"); return; }
  const url = URL.createObjectURL(dataUrlToBlob(a.data));
  window.open(url, "_blank", "noopener");
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}
function addLink(it) {
  let url = prompt("Link-Adresse (URL):", "https://");
  if (!url) return;
  url = url.trim(); if (!/^https?:\/\//i.test(url)) url = "https://" + url;
  const label = (prompt("Bezeichnung (optional):", "") || "").trim();
  (it.att = it.att || []).push({ k: "link", url, label });
  save(); render();
}
function pickFile(it, accept) {
  const inp = document.createElement("input");
  inp.type = "file";
  if (accept) inp.accept = accept;
  // Wichtig für iOS-Safari: das Feld muss kurz im DOM hängen, sonst öffnet der Dialog nicht.
  inp.style.position = "fixed"; inp.style.left = "-9999px"; inp.style.opacity = "0";
  document.body.appendChild(inp);
  inp.onchange = async () => {
    const file = inp.files && inp.files[0];
    inp.remove();
    if (!file) return;
    try {
      const isImg = file.type.startsWith("image/");
      const data = isImg ? await processImage(file) : await readFileAsDataURL(file);
      (it.att = it.att || []).push({ k: isImg ? "img" : "file", name: file.name, mime: file.type, data });
      save(); render();
    } catch (e) { alert("Datei konnte nicht geladen werden."); }
  };
  inp.click();
}

function render() {
  // Richtungs-Tabs
  const routesEl = document.getElementById("routes");
  routesEl.innerHTML = "";
  ROUTES.forEach(r => {
    const b = document.createElement("button");
    b.className = "route-tab" + (r.id === state.active ? " active" : "");
    b.textContent = r.label;
    b.addEventListener("click", () => { if (state.active === r.id) return; state.active = r.id; save(); render(); window.scrollTo(0, 0); });
    routesEl.appendChild(b);
  });
  const activeRoute = ROUTES.find(r => r.id === state.active);
  document.getElementById("sub").textContent = activeRoute.from + " verlassen · Ankunft in " + activeRoute.to;

  const list = document.getElementById("list");
  list.innerHTML = "";
  let total = 0, done = 0;

  cur().sections.forEach((sec, si) => {
    sec.items.forEach(it => { total++; if (it.done) done++; });
    const secDone = sec.items.filter(i => i.done).length;

    const card = document.createElement("section");
    card.className = "section";
    card.innerHTML = `<h2><span class="emoji">${sec.e}</span>${escapeHtml(sec.t)}<span class="sec-count">${secDone}/${sec.items.length}</span></h2>`;
    const ul = document.createElement("ul");

    sec.items.forEach((it, ii) => {
      const li = document.createElement("li");
      if (it.done) li.classList.add("done");

      const rowEl = document.createElement("div");
      rowEl.className = "item-row";
      rowEl.innerHTML = `
        <span class="box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
        <span class="label">${escapeHtml(it.x)}</span>
        <button class="attach-btn" title="Anhang hinzufügen">📎</button>
        <button class="del" title="Entfernen">×</button>`;
      rowEl.querySelector(".label").addEventListener("click", () => { it.done = !it.done; save(); render(); });
      rowEl.querySelector(".box").addEventListener("click", () => { it.done = !it.done; save(); render(); });
      rowEl.querySelector(".del").addEventListener("click", (ev) => { ev.stopPropagation(); sec.items.splice(ii,1); save(); render(); });
      li.appendChild(rowEl);

      const menu = document.createElement("div");
      menu.className = "attach-menu"; menu.style.display = "none";
      menu.innerHTML = `<button data-a="link">🔗 Link</button><button data-a="photo">🖼 Foto</button><button data-a="file">📄 Datei</button>`;
      menu.querySelector('[data-a="link"]').addEventListener("click", () => { menu.style.display = "none"; addLink(it); });
      menu.querySelector('[data-a="photo"]').addEventListener("click", () => { menu.style.display = "none"; pickFile(it, "image/*"); });
      menu.querySelector('[data-a="file"]').addEventListener("click", () => { menu.style.display = "none"; pickFile(it); });
      rowEl.querySelector(".attach-btn").addEventListener("click", (ev) => {
        ev.stopPropagation();
        menu.style.display = menu.style.display === "none" ? "flex" : "none";
      });
      li.appendChild(menu);

      if (it.att && it.att.length) {
        const atts = document.createElement("div");
        atts.className = "atts";
        it.att.forEach((a, ai) => {
          const chip = document.createElement("span");
          chip.className = "att";
          if (a.k === "img")      chip.innerHTML = `<img src="${a.data}" alt=""><span class="att-name">${escapeHtml(a.name || "Bild")}</span><button class="att-del" title="Entfernen">×</button>`;
          else if (a.k === "file") chip.innerHTML = `<span>📄</span><span class="att-name">${escapeHtml(a.name || "Datei")}</span><button class="att-del" title="Entfernen">×</button>`;
          else                     chip.innerHTML = `<span>🔗</span><span class="att-name">${escapeHtml(a.label || a.url)}</span><button class="att-del" title="Entfernen">×</button>`;
          chip.addEventListener("click", () => openAttachment(a));
          chip.querySelector(".att-del").addEventListener("click", (ev) => { ev.stopPropagation(); it.att.splice(ai, 1); save(); render(); });
          atts.appendChild(chip);
        });
        li.appendChild(atts);
      }

      ul.appendChild(li);
    });

    const addRow = document.createElement("div");
    addRow.className = "add-row";
    addRow.innerHTML = `<input type="text" placeholder="Eigenen Punkt hinzufügen…"><button>+</button>`;
    const input = addRow.querySelector("input");
    const addFn = () => { const v = input.value.trim(); if (!v) return; sec.items.push({ x: v, done: false }); save(); render(); };
    addRow.querySelector("button").addEventListener("click", addFn);
    input.addEventListener("keydown", e => { if (e.key === "Enter") addFn(); });
    ul.appendChild(addRow);

    card.appendChild(ul);
    list.appendChild(card);
  });

  const pct = total ? Math.round(done/total*100) : 0;
  document.querySelector("#bar > span").style.width = pct + "%";
  document.getElementById("bar").classList.toggle("complete", done === total && total > 0);
  document.getElementById("count").textContent = `${done} / ${total}`;
  document.getElementById("banner").classList.toggle("show", done === total && total > 0);
  const n = (cur().archives || []).length;
  document.getElementById("archCount").textContent = n ? "(" + n + ")" : "";
}

function resetChecks() {
  cur().sections.forEach(s => s.items.forEach(i => i.done = false));
  save(); render();
}

// ---------- Reise archivieren & Verlauf ----------
function archiveAndRestart() {
  const now = new Date();
  const defName = "Reise " + now.toLocaleDateString("de-DE", { month: "long", year: "numeric" });
  let name = prompt("Name für diese Reise (zum Archivieren):", defName);
  if (name === null) return;              // abgebrochen
  name = name.trim() || defName;
  cur().archives = cur().archives || [];
  cur().archives.unshift({
    id: Date.now(),
    name,
    date: now.toISOString(),
    sections: JSON.parse(JSON.stringify(cur().sections))   // Schnappschuss inkl. Anhänge
  });
  cur().sections.forEach(s => s.items.forEach(i => i.done = false));   // frisch starten
  save(); render();
  alert("Gespeichert als „" + name + "“.\nDie Liste ist jetzt für die nächste Reise zurückgesetzt (Punkte & Anhänge bleiben erhalten).");
}

function openArchives() {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  const panel = document.createElement("div");
  panel.className = "panel";
  overlay.appendChild(panel);
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  renderArchiveList(panel, overlay);
  document.body.appendChild(overlay);
}
function archStats(a) {
  const done = a.sections.reduce((n, s) => n + s.items.filter(i => i.done).length, 0);
  const total = a.sections.reduce((n, s) => n + s.items.length, 0);
  return { done, total };
}
function renderArchiveList(panel, overlay) {
  panel.innerHTML = `<div class="panel-head"><h2>📚 Archivierte Reisen</h2><button class="panel-close" title="Schließen">×</button></div>`;
  panel.querySelector(".panel-close").addEventListener("click", () => overlay.remove());
  const archives = cur().archives || [];
  if (!archives.length) {
    const p = document.createElement("p"); p.className = "panel-empty";
    p.textContent = "Noch keine Reisen archiviert. Über „📁 Reise archivieren & neu starten“ speicherst du den aktuellen Stand.";
    panel.appendChild(p); return;
  }
  const list = document.createElement("div"); list.className = "arch-list";
  archives.forEach(a => {
    const { done, total } = archStats(a);
    const d = new Date(a.date).toLocaleDateString("de-DE", { day: "2-digit", month: "long", year: "numeric" });
    const row = document.createElement("div"); row.className = "arch-row";
    row.innerHTML = `<div class="arch-info"><div class="arch-name"></div><div class="arch-meta">${d} · ${done}/${total} erledigt</div></div>
      <button class="arch-view">Ansehen</button><button class="arch-del" title="Löschen">🗑</button>`;
    row.querySelector(".arch-name").textContent = a.name;
    row.querySelector(".arch-view").addEventListener("click", () => renderArchiveDetail(panel, overlay, a));
    row.querySelector(".arch-del").addEventListener("click", () => {
      if (!confirm("Diese archivierte Reise löschen?")) return;
      cur().archives = cur().archives.filter(x => x.id !== a.id);
      save(); render(); renderArchiveList(panel, overlay);
    });
    list.appendChild(row);
  });
  panel.appendChild(list);
}
function renderArchiveDetail(panel, overlay, a) {
  panel.innerHTML = `<div class="panel-head"><button class="panel-back">‹ Zurück</button><h2></h2><button class="panel-close" title="Schließen">×</button></div>`;
  panel.querySelector("h2").textContent = a.name;
  panel.querySelector(".panel-back").addEventListener("click", () => renderArchiveList(panel, overlay));
  panel.querySelector(".panel-close").addEventListener("click", () => overlay.remove());
  const body = document.createElement("div"); body.className = "arch-detail";
  a.sections.forEach(sec => {
    const h = document.createElement("h3"); h.textContent = sec.e + " " + sec.t; body.appendChild(h);
    sec.items.forEach(it => {
      const row = document.createElement("div"); row.className = "arch-item" + (it.done ? " done" : "");
      const chk = document.createElement("span"); chk.className = "arch-check"; chk.textContent = it.done ? "✓" : "○";
      const lab = document.createElement("span"); lab.textContent = it.x;
      row.appendChild(chk); row.appendChild(lab); body.appendChild(row);
      if (it.att && it.att.length) {
        const atts = document.createElement("div"); atts.className = "atts"; atts.style.marginLeft = "1.6rem";
        it.att.forEach(att => {
          const chip = document.createElement("span"); chip.className = "att";
          if (att.k === "img") chip.innerHTML = `<img src="${att.data}" alt=""><span class="att-name"></span>`;
          else chip.innerHTML = `<span>${att.k === "file" ? "📄" : "🔗"}</span><span class="att-name"></span>`;
          chip.querySelector(".att-name").textContent = att.k === "link" ? (att.label || att.url) : (att.name || (att.k === "img" ? "Bild" : "Datei"));
          chip.addEventListener("click", () => openAttachment(att));
          atts.appendChild(chip);
        });
        body.appendChild(atts);
      }
    });
  });
  panel.appendChild(body);
}
async function resetAll() {
  const r = ROUTES.find(x => x.id === state.active);
  if (!confirm("Liste „" + r.label + "“ auf den Standard zurücksetzen?\n(Eigene Punkte & Anhänge dieser Richtung gehen verloren. Der Verlauf und die andere Richtung bleiben.)")) return;
  cur().sections = r.def.map(freshSection);
  save(); render();
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let state = { active: "loe-vil", routes: { "loe-vil": { sections: [], archives: [] } } };
(async function init() {
  state = await load();
  initialized = true;
  save();      // gemergte Bereiche / Migration sichern
  render();
})();
</script>
